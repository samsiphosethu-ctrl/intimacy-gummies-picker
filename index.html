<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Intimacy Gummy Match</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #ffffff;
}

.quiz-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 28px 20px 36px;
  box-sizing: border-box;
}

.quiz-header {
  text-align: center;
  margin-bottom: 20px;
}

.quiz-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7A8B82;
  margin: 0 0 8px;
}

.quiz-title {
  font-size: 20px;
  font-weight: 700;
  color: #1B3A2F;
  line-height: 1.3;
  margin: 0;
}

.progress-track {
  height: 4px;
  background: #F0EDEA;
  border-radius: 99px;
  margin: 18px 0 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #1B3A2F;
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

.step {
  animation: fadeUp 0.28s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.question-text {
  font-size: 17px;
  font-weight: 600;
  color: #1B3A2F;
  margin: 0 0 18px;
  text-align: center;
  line-height: 1.4;
}

.options-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #ffffff;
  border: 1.5px solid rgba(27,58,47,0.18);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
  text-align: left;
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
}

.option-btn:hover {
  border-color: #1B3A2F;
  background: #F8F6F2;
  transform: translateY(-1px);
}

.option-btn.selected {
  border-color: #1B3A2F;
  background: #1B3A2F;
}

.option-emoji {
  font-size: 22px;
  flex-shrink: 0;
  width: 30px;
  text-align: center;
  line-height: 1;
}

.option-text {
  font-size: 15px;
  font-weight: 500;
  color: #2a2a2a;
  line-height: 1.3;
}

.option-btn.selected .option-text {
  color: #ffffff;
}

/* Result */
.result-card {
  background: #F8F6F2;
  border: 1.5px solid rgba(27,58,47,0.12);
  border-radius: 16px;
  padding: 26px 22px;
  text-align: center;
  animation: fadeUp 0.36s ease both;
}

.result-icon {
  font-size: 42px;
  display: block;
  margin-bottom: 10px;
  line-height: 1;
}

.result-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7A8B82;
  margin: 0 0 6px;
}

.result-title {
  font-size: 20px;
  font-weight: 700;
  color: #1B3A2F;
  margin: 0 0 12px;
  line-height: 1.3;
}

.result-desc {
  font-size: 14px;
  color: #4A5D53;
  line-height: 1.65;
  margin: 0 0 20px;
  text-align: left;
}

.result-cta {
  display: inline-block;
  background: #1B3A2F;
  color: #ffffff;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  padding: 12px 26px;
  border-radius: 99px;
  transition: opacity 0.18s;
  margin-bottom: 8px;
}

.result-cta:hover {
  opacity: 0.85;
  color: #ffffff;
}

.result-sub {
  font-size: 12px;
  color: #7A8B82;
  margin: 4px 0 14px;
  line-height: 1.5;
}

.restart-btn {
  background: none;
  border: none;
  font-size: 13px;
  color: #7A8B82;
  cursor: pointer;
  margin-top: 8px;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 4px 0;
  font-family: inherit;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.restart-btn:hover {
  color: #1B3A2F;
}

/* Accent variants */
.accent-lavender { border-color: rgba(197,184,212,0.5); background: rgba(197,184,212,0.08); }
.accent-pink     { border-color: rgba(232,180,184,0.5); background: rgba(232,180,184,0.08); }
.accent-amber    { border-color: rgba(212,160,74,0.35); background: rgba(212,160,74,0.06); }
.accent-sage     { border-color: rgba(168,197,181,0.5); background: rgba(168,197,181,0.08); }
</style>
</head>
<body>

<div class="quiz-wrap" id="quizWrap">
  <div class="quiz-header">
    <p class="quiz-eyebrow">3 questions</p>
    <h2 class="quiz-title">Find Your Intimacy Gummy Match</h2>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div id="quizBody"></div>
</div>

<script>
// ── Quiz Data ──────────────────────────────────────────────────────
var questions = [
  {
    text: "How would you describe your experience with THC?",
    options: [
      { emoji: "🌱", label: "Brand new to it", value: "new" },
      { emoji: "✨", label: "Tried it a few times", value: "occasional" },
      { emoji: "🔥", label: "Regular cannabis enthusiast", value: "seasoned" }
    ]
  },
  {
    text: "What's the vibe you're going for tonight?",
    options: [
      { emoji: "🕯️", label: "Relaxed, warm, and connected", value: "mellow" },
      { emoji: "⚡", label: "Energized euphoria — the full experience", value: "euphoric" },
      { emoji: "🌿", label: "Everyday support, building over time", value: "daily" }
    ]
  },
  {
    text: "Who are you shopping for?",
    options: [
      { emoji: "🙋", label: "Just me", value: "solo" },
      { emoji: "💑", label: "Me and a partner", value: "partner" },
      { emoji: "🤔", label: "Still figuring it out", value: "undecided" }
    ]
  }
];

// ── Result Definitions ─────────────────────────────────────────────
// NOTE: Sexy Nights Combo price + count must be verified on product page before publish.
var results = {
  daily: {
    icon: "🌿",
    accent: "accent-sage",
    label: "Your Match",
    title: "The Daily Ritual",
    desc: "You're playing the long game — and that's the right call. Botanical-only formulas build cumulative support over four to six weeks of consistent daily use. No THC, no restrictions, available anywhere. Commit to the routine and give the ingredients time to work.",
    ctaText: "Read: Best Weed Gummies for Libido",
    ctaHref: "https://mood.com/blog/best-weed-gummies-for-libido",
    sub: "Always check with your healthcare provider if you are on medications."
  },
  couples: {
    icon: "🕯️",
    accent: "accent-pink",
    label: "Your Match",
    title: "The Couples Pick",
    desc: "A relaxed, manageable evening for two people who may have different comfort levels with THC. The Sexy Nights and Refreshing Mornings Combo bundles an intimacy formula with a morning recovery product — ideal when you want something that works for both of you.",
    // ⚠️ VERIFY PRICE + COUNT ON PRODUCT PAGE BEFORE PUBLISH
    ctaText: "Shop the Sexy Nights and Refreshing Mornings Combo",
    ctaHref: "https://mood.com/product/sexy-nights-and-refreshing-mornings-combo",
    sub: "For adults 21+ only. THC products may affect a drug test. Do not drive or operate machinery after use."
  },
  gentle: {
    icon: "🌙",
    accent: "accent-lavender",
    label: "Your Match",
    title: "Start Gentle",
    desc: "Starting at a lower amount — 2.5 to 5mg — lets you understand how your body responds before going further. Try it solo first so you know what to expect before sharing the experience with a partner.",
    ctaText: "Read: Do Edibles Make You Horny?",
    ctaHref: "https://mood.com/blog/do-edibles-make-you-horny-weed-gummies-for-sex-explained",
    sub: "For adults 21+ only. THC products may affect a drug test. Do not drive or operate machinery after use."
  },
  advanced: {
    icon: "⚡",
    accent: "accent-amber",
    label: "Your Match",
    title: "Sexual Euphoria Advanced",
    desc: "The widest formula on the list: 15mg Delta-9 THC, 5mg THCv, 10mg CBD, and nine botanicals including maca, L-arginine, and Korean red ginseng. Nano-emulsified for onset in 5 to 15 minutes rather than the usual 30 to 90.",
    ctaText: "Get a 10-count of Sexual Euphoria Advanced for $39",
    ctaHref: "https://mood.com/product/sexual-euphoria-advanced",
    sub: "Not for beginners. Start at ¼ gummy. For adults 21+ only. THC products may affect a drug test. Do not drive or operate machinery after use."
  }
};

// ── State ──────────────────────────────────────────────────────────
var current = 0;
var answers = [];

// ── Result Logic ───────────────────────────────────────────────────
function getResult() {
  var vibe = answers[1];
  var who  = answers[2];
  var exp  = answers[0];
  if (vibe === 'daily')                               return results.daily;
  if (who === 'partner')                              return results.couples;
  if (exp === 'seasoned' && vibe === 'euphoric')      return results.advanced;
  return results.gentle;
}

// ── Render Question ────────────────────────────────────────────────
function renderQuestion(idx) {
  var q   = questions[idx];
  var pct = Math.round((idx / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  var opts = q.options.map(function(opt) {
    return '<button class="option-btn" onclick="selectOption(\'' + opt.value + '\', this)">'
      + '<span class="option-emoji">' + opt.emoji + '</span>'
      + '<span class="option-text">' + opt.label + '</span>'
      + '</button>';
  }).join('');

  document.getElementById('quizBody').innerHTML =
    '<div class="step">'
    + '<p class="question-text">' + q.text + '</p>'
    + '<div class="options-grid">' + opts + '</div>'
    + '</div>';

  sendHeight();
}

// ── Select Option ──────────────────────────────────────────────────
function selectOption(value, btn) {
  btn.classList.add('selected');
  answers[current] = value;
  current++;
  setTimeout(function() {
    if (current < questions.length) {
      renderQuestion(current);
    } else {
      renderResult();
    }
  }, 300);
}

// ── Render Result ──────────────────────────────────────────────────
function renderResult() {
  var r = getResult();
  document.getElementById('progressFill').style.width = '100%';

  document.getElementById('quizBody').innerHTML =
    '<div class="result-card ' + r.accent + '">'
    + '<span class="result-icon">' + r.icon + '</span>'
    + '<p class="result-label">' + r.label + '</p>'
    + '<h3 class="result-title">' + r.title + '</h3>'
    + '<p class="result-desc">' + r.desc + '</p>'
    + '<a class="result-cta" href="' + r.ctaHref + '" target="_blank" rel="noopener">' + r.ctaText + '</a>'
    + '<p class="result-sub">' + r.sub + '</p>'
    + '<button class="restart-btn" onclick="restartQuiz()">&#8592; Take it again</button>'
    + '</div>';

  sendHeight();
}

// ── Restart ────────────────────────────────────────────────────────
function restartQuiz() {
  current = 0;
  answers = [];
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion(0);
}

// ── iframe Auto-Resize ─────────────────────────────────────────────
function sendHeight() {
  setTimeout(function() {
    var h = document.getElementById('quizWrap').scrollHeight;
    window.parent.postMessage({ type: 'resize', height: h + 24 }, '*');
  }, 60);
}

window.addEventListener('resize', sendHeight);

// ── Init ───────────────────────────────────────────────────────────
renderQuestion(0);
</script>

</body>
</html>
